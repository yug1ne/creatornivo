name: Database Backup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: database-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get remove -y postgresql-client postgresql-client-16 2>/dev/null || true
          sudo apt-get install -y postgresql-client-17
          echo "PATH diagnostics:"
          command -v pg_dump || true
          ls -la "$(command -v pg_dump || echo /usr/bin/pg_dump)" || true
          /usr/lib/postgresql/17/bin/pg_dump --version
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Install age and unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y age unzip

      - name: Install AWS CLI v2
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Run encrypted backup upload
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_AGE_PUBLIC_KEY: ${{ secrets.BACKUP_AGE_PUBLIC_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          BACKUP_RETENTION_DAYS: "30"
          PG_DUMP: /usr/lib/postgresql/17/bin/pg_dump
        run: |
          pg_dump --version
          chmod +x scripts/backup/backup.sh scripts/backup/lib/common.sh
          scripts/backup/backup.sh

  notify-failure:
    runs-on: ubuntu-latest
    needs: backup
    if: failure()
    permissions:
      contents: read
      issues: write

    steps:
      - name: Create backup failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const title = `[backup-failure] Database backup failed (${today})`;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 20,
            });

            if (existing.some((issue) => issue.title === title)) {
              core.info(`Open issue already exists: ${title}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## Automated alert: database backup workflow failed',
                '',
                'Temporary notification until Sentry/monitoring is configured.',
                '',
                `- **Workflow run:** ${runUrl}`,
                `- **Time (UTC):** ${new Date().toISOString()}`,
                '',
                '### What to do',
                '1. Open the workflow run and read the *Run encrypted backup upload* step log.',
                '2. Follow `roadmap.md` §14 (*Что делать при ошибке backup*).',
                '3. After fix: re-run workflow and close this issue.',
                '',
                '### Do not paste here',
                'Connection strings, age keys, R2 secrets, or dump contents.',
              ].join('\n'),
            });